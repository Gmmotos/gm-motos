<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trabajos | GM Motos</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0a0a;
    color: white;
}

header {
    background: black;
    padding: 20px;
    text-align: center;
    border-bottom: 3px solid orange;
}

h2 {
    text-align: center;
    margin: 30px 0;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: #1a1a1a;
    padding: 15px;
    border-radius: 10px;
}

.card img, .card iframe {
    width: 100%;
    border-radius: 10px;
}

.card h3 {
    margin-top: 10px;
}

.btn {
    display: inline-block;
    margin: 20px;
    padding: 15px 25px;
    background: orange;
    color: black;
    text-decoration: none;
    font-weight: bold;
    border-radius: 30px;
}
</style>
</head>

<body>

<header>
    <h1>Trabajos GM Motos</h1>
</header>

<h2>Fotos y videos reales</h2>

<div class="grid">

    <div class="card">
        <img src="electricidad.jpg">
        <h3>Trabajo de Restauracion Electrica</h3>
    </div>

    <div class="card">
        <img src="motor2.jpg">
        <h3>Reparacion de Burro de Arranque</h3>
    </div>

    <div class="card">
        <iframe 
        src="https://www.youtube.com/embed/YwudpXYjIso"
        frameborder="0" 
        allowfullscreen>
        </iframe>
        <h3>Service completo</h3>
        <p>Mantenimiento completo con revisión general y puesta a punto.</p>
    </div>

</div>

<div style="text-align:center;">
    <a class="btn" href="index.html">VOLVER</a>
</div>

</body>
</html>
